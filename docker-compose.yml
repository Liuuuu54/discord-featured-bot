services:
  discord-bot:
    build: .
    container_name: dc-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - PYTHONIOENCODING=utf-8
      # Booklist publish API (values come from host .env).
      - BOOKLIST_API_ENABLED=${BOOKLIST_API_ENABLED:-false}
      - BOOKLIST_API_SECRET=${BOOKLIST_API_SECRET:-}
      - BOOKLIST_API_PORT=${BOOKLIST_API_PORT:-10820}
      # Other settings use defaults from config.py.
    volumes:
      # Persist data directory.
      - ./data:/app/data
      # Persist log directory.
      - ./data/logs:/app/data/logs
    networks:
      - bot-network
    # Docker log settings.
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    # Resource limits.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

networks:
  bot-network:
    driver: bridge

volumes:
  bot-data:
    driver: local
